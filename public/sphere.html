<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glowing 3D Sphere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050510;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
        }

        canvas {
            display: block;
        }

        #hint {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(180, 160, 255, 0.5);
            font-size: 13px;
            letter-spacing: 0.1em;
            pointer-events: none;
            animation: fadeHint 4s ease-in-out 2s forwards;
        }

        @keyframes fadeHint {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="hint">Move your mouse to interact</div>

    <script type="importmap">
        {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js"
      }
    }
  </script>

    <script type="module">
        import * as THREE from 'three';

    // Scene setup
    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 4);

    // Mouse tracking
    const mouse = new THREE.Vector2(0, 0);
    const targetRotation = new THREE.Vector2(0, 0);
    const currentRotation = new THREE.Vector2(0, 0);

    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    // Sphere geometry
    const geometry = new THREE.SphereGeometry(1, 128, 128);

    // Custom shader material for the sphere
    const sphereMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uMouse: { value: new THREE.Vector2(0, 0) },
        uColor1: { value: new THREE.Color('#7b2ff7') },
        uColor2: { value: new THREE.Color('#00d4ff') },
        uColor3: { value: new THREE.Color('#ff3cac') },
      },
      vertexShader: `
        uniform float uTime;
        uniform vec2 uMouse;
        varying vec3 vNormal;
        varying vec3 vPosition;
        varying float vDisplace;

        // Simplex-like noise
        vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

        float snoise(vec3 v) {
          const vec2 C = vec2(1.0/6.0, 1.0/3.0);
          const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
          vec3 i = floor(v + dot(v, C.yyy));
          vec3 x0 = v - i + dot(i, C.xxx);
          vec3 g = step(x0.yzx, x0.xyz);
          vec3 l = 1.0 - g;
          vec3 i1 = min(g.xyz, l.zxy);
          vec3 i2 = max(g.xyz, l.zxy);
          vec3 x1 = x0 - i1 + C.xxx;
          vec3 x2 = x0 - i2 + C.yyy;
          vec3 x3 = x0 - D.yyy;
          i = mod289(i);
          vec4 p = permute(permute(permute(
            i.z + vec4(0.0, i1.z, i2.z, 1.0))
            + i.y + vec4(0.0, i1.y, i2.y, 1.0))
            + i.x + vec4(0.0, i1.x, i2.x, 1.0));
          float n_ = 0.142857142857;
          vec3 ns = n_ * D.wyz - D.xzx;
          vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
          vec4 x_ = floor(j * ns.z);
          vec4 y_ = floor(j - 7.0 * x_);
          vec4 x = x_ *ns.x + ns.yyyy;
          vec4 y = y_ *ns.x + ns.yyyy;
          vec4 h = 1.0 - abs(x) - abs(y);
          vec4 b0 = vec4(x.xy, y.xy);
          vec4 b1 = vec4(x.zw, y.zw);
          vec4 s0 = floor(b0)*2.0 + 1.0;
          vec4 s1 = floor(b1)*2.0 + 1.0;
          vec4 sh = -step(h, vec4(0.0));
          vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
          vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
          vec3 p0 = vec3(a0.xy, h.x);
          vec3 p1 = vec3(a0.zw, h.y);
          vec3 p2 = vec3(a1.xy, h.z);
          vec3 p3 = vec3(a1.zw, h.w);
          vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
          p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
          vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
          m = m * m;
          return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
        }

        void main() {
          vNormal = normalize(normalMatrix * normal);
          vPosition = position;

          float speed = uTime * 0.4;
          float mouseInfluence = length(uMouse) * 0.3;
          vec3 noisePos = position * 1.8 + vec3(speed, speed * 0.7, speed * 0.5);
          float noise = snoise(noisePos + vec3(uMouse.x, uMouse.y, 0.0) * 0.5);
          float displacement = noise * 0.18 + mouseInfluence * 0.1;
          vDisplace = displacement;

          vec3 newPos = position + normal * displacement;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform vec2 uMouse;
        uniform vec3 uColor1;
        uniform vec3 uColor2;
        uniform vec3 uColor3;
        varying vec3 vNormal;
        varying vec3 vPosition;
        varying float vDisplace;

        void main() {
          vec3 viewDir = normalize(cameraPosition - vPosition);
          float fresnel = pow(1.0 - max(dot(vNormal, viewDir), 0.0), 3.0);

          float t1 = sin(uTime * 0.5 + vPosition.x * 2.0) * 0.5 + 0.5;
          float t2 = cos(uTime * 0.3 + vPosition.y * 2.5) * 0.5 + 0.5;
          float mouseFactor = length(uMouse) * 0.5;

          vec3 baseColor = mix(uColor1, uColor2, t1);
          baseColor = mix(baseColor, uColor3, t2 * 0.5 + mouseFactor * 0.3);

          // Core glow
          vec3 color = baseColor * (0.6 + vDisplace * 2.0);
          // Fresnel rim
          color += mix(uColor2, uColor3, sin(uTime) * 0.5 + 0.5) * fresnel * 2.5;
          // Specular highlight driven by mouse
          vec3 lightDir = normalize(vec3(uMouse.x * 2.0, uMouse.y * 2.0, 3.0));
          float spec = pow(max(dot(reflect(-lightDir, vNormal), viewDir), 0.0), 32.0);
          color += vec3(1.0, 0.85, 1.0) * spec * 1.5;

          float alpha = 0.92 + fresnel * 0.08;
          gl_FragColor = vec4(color, alpha);
        }
      `,
      transparent: true,
    });

    const sphere = new THREE.Mesh(geometry, sphereMaterial);
    scene.add(sphere);

    // Wireframe overlay
    const wireGeo = new THREE.SphereGeometry(1.02, 32, 32);
    const wireMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color('#a78bfa'),
      wireframe: true,
      transparent: true,
      opacity: 0.04,
    });
    const wireframe = new THREE.Mesh(wireGeo, wireMat);
    scene.add(wireframe);

    // Glow halo (sprite billboard)
    function makeGlowSprite(color, size) {
      const canvas2d = document.createElement('canvas');
      canvas2d.width = canvas2d.height = 256;
      const ctx = canvas2d.getContext('2d');
      const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
      grad.addColorStop(0, color.replace(')', ', 0.6)').replace('rgb', 'rgba'));
      grad.addColorStop(0.3, color.replace(')', ', 0.15)').replace('rgb', 'rgba'));
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 256, 256);
      const tex = new THREE.CanvasTexture(canvas2d);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(size, size, 1);
      return sprite;
    }

    const glowA = makeGlowSprite('rgb(123, 47, 247)', 5.0);
    const glowB = makeGlowSprite('rgb(0, 212, 255)', 4.5);
    const glowC = makeGlowSprite('rgb(255, 60, 172)', 4.0);
    glowA.position.set(0, 0, -0.5);
    glowB.position.set(0, 0, -0.5);
    glowC.position.set(0, 0, -0.5);
    scene.add(glowA, glowB, glowC);

    // Particle field
    const particleCount = 1200;
    const pGeo = new THREE.BufferGeometry();
    const pPositions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      const r = 2.2 + Math.random() * 3;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      pPositions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
      pPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      pPositions[i * 3 + 2] = r * Math.cos(phi);
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
    const pMat = new THREE.PointsMaterial({
      color: new THREE.Color('#c4b5fd'),
      size: 0.012,
      transparent: true,
      opacity: 0.7,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const particles = new THREE.Points(pGeo, pMat);
    scene.add(particles);

    // Ambient + point lights (for any non-shader meshes)
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const pointLight = new THREE.PointLight(0x9b59f7, 3, 10);
    pointLight.position.set(2, 2, 2);
    scene.add(pointLight);

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animate
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      // Smooth mouse follow
      targetRotation.x = mouse.y * 0.8;
      targetRotation.y = mouse.x * 0.8;
      currentRotation.x += (targetRotation.x - currentRotation.x) * 0.05;
      currentRotation.y += (targetRotation.y - currentRotation.y) * 0.05;

      sphere.rotation.x = currentRotation.x;
      sphere.rotation.y = elapsed * 0.3 + currentRotation.y;
      wireframe.rotation.copy(sphere.rotation);
      particles.rotation.y = elapsed * 0.05;
      particles.rotation.x = elapsed * 0.03;

      // Pulse glow opacity
      const pulse = Math.sin(elapsed * 1.2) * 0.15 + 0.85;
      glowA.material.opacity = pulse * 0.7;
      glowB.material.opacity = pulse * 0.5;
      glowC.material.opacity = Math.sin(elapsed * 0.9 + 1) * 0.15 + 0.4;

      // Slowly shift glow hue
      glowB.position.x = Math.sin(elapsed * 0.4) * 0.3;
      glowC.position.y = Math.cos(elapsed * 0.4) * 0.3;

      // Update shader uniforms
      sphereMaterial.uniforms.uTime.value = elapsed;
      sphereMaterial.uniforms.uMouse.value.set(mouse.x, mouse.y);

      // Light follow mouse
      pointLight.position.x = mouse.x * 3;
      pointLight.position.y = mouse.y * 3;

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>

</html>
