<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Douglas Mitchell — signal teal on ink.
    Editorial serif "D" (hand-drawn path in the Instrument Serif spirit:
    bracketed serifs, vertical stress, high contrast) over an ink ground
    with a teal hairline keyline. No fonts, no amber.
  -->
  <defs>
    <linearGradient id="dm-signal" x1="32" y1="15" x2="32" y2="49" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#83D0CA"/>
      <stop offset="1" stop-color="#4C9E99"/>
    </linearGradient>
    <radialGradient id="dm-glow" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#5EBDBA" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#5EBDBA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ink ground -->
  <rect width="64" height="64" rx="14" fill="#0E141B"/>
  <!-- Soft signal bloom behind the letterform -->
  <rect width="64" height="64" rx="14" fill="url(#dm-glow)"/>
  <!-- Teal hairline keyline -->
  <rect x="1.75" y="1.75" width="60.5" height="60.5" rx="12.75" stroke="#5EBDBA" stroke-opacity="0.32"/>

  <!-- Serif D — thick stem and bowl with vertical stress, thin arches,
       bracketed slab serifs on the left -->
  <path
    fill="url(#dm-signal)"
    fill-rule="evenodd"
    clip-rule="evenodd"
    d="M13.1 15.4 H30.1 C42.3 15.4 50.9 21.2 50.9 32 C50.9 42.8 42.3 48.6 30.1 48.6 H13.1 V47 C15.9 46.8 17.8 46.5 17.8 44 V20 C17.8 17.5 15.9 17.2 13.1 17 Z M25.2 18.4 H29.8 C39.1 18.4 44.9 23.4 44.9 32 C44.9 40.6 39.1 45.6 29.8 45.6 H25.2 Z"
  />
</svg>
